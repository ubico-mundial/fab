<html lang="pl">
<head>

   <link rel="icon" type="image/jpeg" href="https://i.ibb.co/Qv1dF627/ubc.png">

        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; box-sizing: border-box; }
        
        .logo-container { text-align: center; margin-bottom: 10px; width: 100%; }
        .logo-container img { max-width: 180px; width: 100%; height: auto; object-fit: containment; }
        
        h1, h2 { text-align: center; color: var(--primary); margin-bottom: 5px; }
        .group-header-active { background: #1a2238; color: var(--primary); font-weight: bold; padding: 12px; border-radius: 6px; margin: 15px 0; text-align: center; font-size: 18px; border: 2px solid var(--primary); }
        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin-bottom: 20px; box-sizing: border-box; }
        input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: none; box-sizing: border-box; }
        input[type="text"] { background: #2a3558; color: white; font-size: 16px; text-align: center; }
        button { background: var(--primary); color: var(--bg); font-weight: bold; cursor: pointer; font-size: 16px; }
        button:disabled { background: #4a5568; color: #a0aec0; cursor: not-allowed; box-shadow: none !important; }
        button:hover:not(:disabled) { opacity: 0.9; }
        .hidden { display: none !important; }
        
        /* Ekran ładowania (Loader) */
        #loading-screen { text-align: center; padding: 40px 20px; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 42px; height: 42px; border-radius: 50%; border-left-color: var(--primary); animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .match-row { display: flex; align-items: center; justify-content: space-between; margin: 12px 0; padding-bottom: 8px; border-bottom: 1px solid #2a3558; }
        .match-info { display: flex; flex-direction: column; width: 65%; }
        .match-teams { font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .match-date { font-size: 11px; color: #8a99ad; margin-top: 3px; }
        .locked-text { color: var(--danger); font-weight: bold; }
        .submitted-text { color: var(--primary); font-weight: bold; }
        .score-inputs { display: flex; gap: 8px; align-items: center; }
        .score-inputs input { width: 42px; text-align: center; margin: 0; padding: 6px; background: #2a3558; color: white; border: none; border-radius: 4px; font-size: 16px; }
        .score-inputs input:disabled { background: #131927; color: #6c7a9c; cursor: not-allowed; }
        
        .success-box { background: rgba(1, 195, 141, 0.1); border: 2px dashed var(--primary); color: var(--primary); text-align: center; padding: 15px; border-radius: 8px; margin-top: 25px; font-weight: bold; font-size: 16px; }
        
        img.emoji { height: 1.2em; width: 1.2em; margin: 0 .15em; vertical-align: -0.2em; }
        
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; min-width: 1600px; }
        th, td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #2a3558; font-size: 12px; }
        th { color: var(--primary); background: #1a2238; font-weight: 600; vertical-align: middle; }
        .th-match-header { font-size: 11px; font-weight: bold; color: white; white-space: nowrap; min-width: 90px; text-align: center; letter-spacing: 0.5px; display: flex; align-items: center; justify-content: center; gap: 4px; }
        
        .cell-exact { background-color: #028a5a !important; color: white !important; font-weight: bold; } 
        .cell-trend { background-color: #b8860b !important; color: white !important; font-weight: bold; } 
        .cell-miss { background-color: #8b0000 !important; color: #ffcccc !important; } 

        .leaderboard-table { min-width: 100% !important; }
        .leaderboard-table th, .leaderboard-table td { padding: 10px; font-size: 14px; }
        .leaderboard-row:nth-child(1) { background: rgba(255, 215, 0, 0.15); } 
        .rank-badge { font-weight: bold; display: inline-block; width: 24px; height: 24px; line-height: 24px; border-radius: 50%; background: #2a3558; color: white; text-align: center; font-size: 12px; }
        .leaderboard-row:nth-child(1) .rank-badge { background: #ffd700; color: #131927; }
        .leaderboard-row:nth-child(2) .rank-badge { background: #c0c0c0; color: #131927; }
        .leaderboard-row:nth-child(3) .rank-badge { background: #cd7f32; color: #131927; }
        .stats-span { font-size: 11px; color: #8a99ad; margin-left: 5px; font-weight: normal; }

        .progress-bar { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 6px; 
            background: #1a2238; 
            padding: 8px; 
            border-radius: 6px; 
            margin-bottom: 15px; 
            box-sizing: border-box;
        }
        .progress-step { 
            color: #6c7a9c; 
            background: #131927;
            cursor: pointer; 
            padding: 10px 0; 
            border-radius: 4px; 
            transition: background 0.2s; 
            text-align: center; 
            font-size: 14px; 
            font-weight: bold;
        }
        .progress-step:hover { background: #2a3558; color: white; }
        .progress-step.active { color: var(--bg); background: var(--primary); }

        @media (min-width: 500px) {
            .progress-bar { grid-template-columns: repeat(12, 1fr); gap: 4px; }
            .progress-step { padding: 6px 0; font-size: 12px; }
            .logo-container img { max-width: 240px; }
        }
    </style>
</head>

        { id: "Mecz65", group: "K", t1: "Kolumbia", t2: "Portugalia", lock: "2026-06-28T01:30:00", score: "" },
        { id: "Mecz59", group: "J", t1: "Algieria", t2: "Austria", lock: "2026-06-28T04:00:00", score: "" },
        { id: "Mecz60", group: "J", t1: "Jordania", t2: "Argentyna", lock: "2026-06-28T04:00:00", score: "" }
    ];

    function getFlagAnd3LetterCode(teamName) {
        if (!teamName) return "???";
        const flag = teamFlags[teamName] || "";
        return `${flag} ${teamName.substring(0, 3).toUpperCase()}`;
    }

    function refreshTwemoji() {
        if (window.twemoji) {
            twemoji.parse(document.body, { folder: 'svg', ext: '.svg' });
        }
    }

    function isGroupSubmittedByPlayer(groupLetter) {
        const nick = localStorage.getItem('typerNick') || "";
        return localStorage.getItem(`submitted_group_${groupLetter.toLowerCase()}_${nick.toLowerCase()}`) === "true";
    }

    async function initApp() {
        try {
            await loadAllScores(); 
        } catch (e) {
            console.error("Ignorowany błąd pobierania bazy przy starcie:", e);
        }

        document.getElementById('loading-screen').classList.add('hidden');
        const savedNick = localStorage.getItem('typerNick');

        if (savedNick) { 
            showApp(savedNick); 
        } else {
            document.getElementById('login-screen').classList.remove('hidden');
            refreshTwemoji();
        }
    }

    window.onload = initApp;

    function loginUser() {
        const nickInput = document.getElementById('nick-input');
        const nick = nickInput.value.trim();
        if (nick.length < 3) return alert('Nick musi mieć min. 3 znaki!');

        localStorage.setItem('typerNick', nick);
        document.getElementById('login-screen').classList.add('hidden');
        showApp(nick);
    }

    function showApp(nick) {
        document.getElementById('app-screen').classList.remove('hidden');
        document.getElementById('user-display').innerText = nick;
        
        fillLocalDraftFromDatabase(nick);
        renderProgressBar();
        renderActiveGroup();
    }

    function fillLocalDraftFromDatabase(nick) {
        if (!existingDatabaseRows || existingDatabaseRows.length === 0) return;
        const userRow = existingDatabaseRows.find(r => r.gracz && r.gracz.toLowerCase() === nick.toLowerCase());
        if (userRow) {
            // Skanujemy wszystkie grupy
            groupsOrder.forEach(g => {
                const groupMatches = allMatches.filter(m => m.group === g);
                let hasAtLeastOnePrediction = false;

                groupMatches.forEach(m => {
                    const matchKey = m.id.toLowerCase();
                    const score = userRow[matchKey]; 
                    if (score && score.includes(":")) {
                        const parts = score.split(":");
                        localDraftScores[`home-${m.id}`] = parts[0].trim();
                        localDraftScores[`away-${m.id}`] = parts[1].trim();
                        hasAtLeastOnePrediction = true;
                    }
                });

                // Jeśli w bazie są już wpisane typy gracza dla tej grupy, oznacz ją jako wysłaną
                if (hasAtLeastOnePrediction) {
                    localStorage.setItem(`submitted_group_${g.toLowerCase()}_${nick.toLowerCase()}`, "true");
                }
            });
        }
    }

    function renderProgressBar() {
        const bar = document.getElementById('steps-bar');
        bar.innerHTML = "";
        groupsOrder.forEach((g, idx) => {
            const span = document.createElement('span');
            const isDone = isGroupSubmittedByPlayer(g);
            span.className = `progress-step ${idx === currentGroupIndex ? 'active' : ''}`;
            span.innerText = isDone ? `${g} ✓` : g; 
            span.onclick = () => changeGroup(idx);
            bar.appendChild(span);
        });
    }

    function changeGroup(targetIndex) {
        saveCurrentInputsToDraft();
        currentGroupIndex = targetIndex;
        renderProgressBar();
        renderActiveGroup();
    }

    function saveCurrentInputsToDraft() {
        const currentLetter = groupsOrder[currentGroupIndex];
        if (isGroupSubmittedByPlayer(currentLetter)) return;

        const rows = document.querySelectorAll('.match-row');
        rows.forEach(row => {
            const id = row.getAttribute('data-id');
            const isLocked = row.getAttribute('data-locked') === "true";
            if (!isLocked) {
                const homeInput = row.querySelector('.home-team');
                const awayInput = row.querySelector('.away-team');
                if(homeInput && awayInput) {
                    localDraftScores[`home-${id}`] = homeInput.value;
                    localDraftScores[`away-${id}`] = awayInput.value;
                }
            }
        });
    }

    function renderActiveGroup() {
        const currentLetter = groupsOrder[currentGroupIndex];
        document.getElementById('group-title').innerText = `🏆 FAZA GRUPOWA — GRUPA ${currentLetter}`;
        
        const container = document.getElementById('matches-list');
        container.innerHTML = "";
        const now = new Date();

        const groupMatches = allMatches.filter(m => m.group === currentLetter);
        const isGroupPermanentlyLocked = isGroupSubmittedByPlayer(currentLetter);

        groupMatches.forEach((match, index) => {
            const lockTime = new Date(match.lock);
            
            // JESTEŚMY DYNAMICZNI: Mecz blokuje się automatycznie jeśli czas minął, LUB cała grupa została wysłana
            const isLocked = (now >= lockTime) || isGroupPermanentlyLocked;

            const div = document.createElement('div');
            div.className = "match-row";
            div.setAttribute('data-id', match.id);
            div.setAttribute('data-locked', isLocked);
            
            const nextMatch = groupMatches[index + 1];
            const nextMatchId = nextMatch ? nextMatch.id : null;

            const savedHome = localDraftScores[`home-${match.id}`] || "";
            const savedAway = localDraftScores[`away-${match.id}`] || "";

            const f1 = teamFlags[match.t1] || "";
            const f2 = teamFlags[match.t2] || "";

            let officialResultText = "";
            if(match.score && match.score !== "") {
                officialResultText = ` <b style="color:var(--primary)">[Wynik: ${match.score}]</b>`;
            }

            let statusMessage = '⏰ Start PL: ' + match.lock.replace('T', ' ');
            if (now >= lockTime) {
                statusMessage = '<span class="locked-text">🔒 ZABLOKOWANY (Czas minął)</span>';
            } else if (isGroupPermanentlyLocked) {
                statusMessage = '<span class="submitted-text">🔒 ZABLOKOWANY (Wysłano)</span>';
            }

            div.innerHTML = `
                <div class="match-info">
                    <span class="match-teams">${f1} ${match.t1} - ${f2} ${match.t2} ${officialResultText}</span>
                    <span class="match-date">${statusMessage}</span>
                </div>
                <div class="score-inputs">
                    <input type="number" class="home-team" id="home-${match.id}" min="0" placeholder="-" value="${savedHome}" ${isLocked ? 'disabled' : ''} oninput="handleHomeInput('${match.id}')">
                    <span>:</span>
                    <input type="number" class="away-team" id="away-${match.id}" min="0" placeholder="-" value="${savedAway}" ${isLocked ? 'disabled' : ''} oninput="handleAwayInput('${match.id}', '${nextMatchId}')">
                </div>
            `;
            container.appendChild(div);
        });

        validateGroupCompletion();
        refreshTwemoji(); 
    }

    function handleHomeInput(matchId) {
        const homeInput = document.getElementById(`home-${matchId}`);
        if (homeInput && homeInput.value !== "") {
            const awayInput = document.getElementById(`away-${matchId}`);
            if(awayInput) awayInput.focus();
        }
        saveCurrentInputsToDraft();
        validateGroupCompletion();
    }

    function handleAwayInput(currentMatchId, nextMatchId) {
        const awayInput = document.getElementById(`away-${currentMatchId}`);
        if (awayInput && awayInput.value !== "" && nextMatchId) {
            const nextHomeInput = document.getElementById(`home-${nextMatchId}`);
            if (nextHomeInput && !nextHomeInput.disabled) { nextHomeInput.focus(); }
        }
        saveCurrentInputsToDraft();
        validateGroupCompletion();
    }

    function validateGroupCompletion() {
        const currentLetter = groupsOrder[currentGroupIndex];
        const submitContainer = document.getElementById('submit-container');

        if (isGroupSubmittedByPlayer(currentLetter)) {
            submitContainer.innerHTML = `<div class="success-box">⭐ Ta grupa została już przez Ciebie zatwierdzona i zablokowana!</div>`;
            return;
        }

        submitContainer.innerHTML = `
            <button id="submit-btn" onclick="submitCurrentGroup()" style="margin-top: 25px; font-size: 18px; box-shadow: 0 4px 10px rgba(1, 195, 141, 0.3);" disabled>
                Wypełnij wszystkie mecze grupy
            </button>
        `;

        const rows = document.querySelectorAll('.match-row');
        let allFilled = true;
        rows.forEach(row => {
            const isLocked = row.getAttribute('data-locked') === "true";
            // Interesują nas tylko te mecze, które są AKTYWNE (nie minął ich czas)
            if (!isLocked) {
                const homeInput = row.querySelector('.home-team');
                const awayInput = row.querySelector('.away-team');
                if (homeInput && awayInput && (homeInput.value === "" || awayInput.value === "")) {
                    allFilled = false;
                }
            }
        });

        const btn = document.getElementById('submit-btn');
        if (btn) {
            if (allFilled) {
                btn.removeAttribute('disabled');
                btn.innerText = currentGroupIndex === groupsOrder.length - 1 ? "💾 Zapisz i Zakończ Typowanie!" : `💾 Zapisz i przejdź do Grupy ${groupsOrder[currentGroupIndex + 1]}`;
            } else {
                btn.setAttribute('disabled', 'true');
                btn.innerText = "Wpisz wszystkie otwarte wyniki tej grupy, aby przejść dalej";
            }
        }
    }

    async function submitCurrentGroup() {
        const currentLetter = groupsOrder[currentGroupIndex];
        const nick = localStorage.getItem('typerNick');

        if (isGroupSubmittedByPlayer(currentLetter)) return;

        saveCurrentInputsToDraft();

        const updateData = { "gracz": nick };
        allMatches.forEach(m => {
            const matchKey = m.id.toLowerCase();
            const homeVal = localDraftScores[`home-${m.id}`];
            const awayVal = localDraftScores[`away-${m.id}`];
            if (homeVal !== undefined && awayVal !== undefined && homeVal !== "" && awayVal !== "") {
                updateData[matchKey] = `${homeVal}:${awayVal}`;
            } else {
                updateData[matchKey] = ""; 
            }
        });

        const btn = document.getElementById('submit-btn');

        try {
            if (btn) {
                btn.setAttribute('disabled', 'true');
                btn.innerText = "Wysyłanie do bazy...";
            }

            const res = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify(updateData)
            });
            
            const responseData = await res.json();

            if (responseData.status === "error") {
                throw new Error(responseData.message || "Błąd wewnętrzny bazy Google Sheets");
            }

            // Sukces: Zapisujemy blokadę grupy w przeglądarce
            localStorage.setItem(`submitted_group_${currentLetter.toLowerCase()}_${nick.toLowerCase()}`, "true");

            const indexToUpdate = existingDatabaseRows.findIndex(r => r.gracz && r.gracz.toLowerCase() === nick.toLowerCase());
            if(indexToUpdate !== -1) {
                Object.assign(existingDatabaseRows[indexToUpdate], updateData);
            } else {
                existingDatabaseRows.push(updateData);
            }

            if (currentGroupIndex < groupsOrder.length - 1) {
                alert(`Grupa ${groupsOrder[currentGroupIndex]} została zapisana i ZABLOKOWANA przed zmianami! 🚀`);
                currentGroupIndex++;
                renderProgressBar(); renderActiveGroup(); 
                try { await loadAllScores(); } catch(e){}
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                alert("Wszystkie grupy zostały oficjalnie zapisane i zablokowane! Powodzenia! 🎉");
                renderProgressBar(); renderActiveGroup();
                try { await loadAllScores(); } catch(e){}
            }

        } catch (error) {
            console.error(error);
            alert('❌ Błąd zapisu! Dane NIE trafiły do bazy danych. Powód: ' + error.message);
            if (btn) btn.removeAttribute('disabled');
            validateGroupCompletion(); 
        }
    }

    function evaluatePrediction(playerPrediction, officialResult) {
        if (!officialResult || officialResult === "" || !playerPrediction || playerPrediction === "-" || !playerPrediction.includes(":")) {
            return { points: 0, cssClass: "", type: "none" }; 
        }
        if (playerPrediction.trim() === officialResult.trim()) {
            return { points: 45, cssClass: "cell-exact", type: "exact" }; 
        }
        const [pHome, pAway] = playerPrediction.split(":").map(Number);
        const [oHome, oAway] = officialResult.split(":").map(Number);
        const playerTrend = pHome > pAway ? 1 : (pHome < pAway ? -1 : 0);
        const officialTrend = oHome > oAway ? 1 : (oHome < oAway ? -1 : 0);
        if (playerTrend === officialTrend) {
            return { points: 30, cssClass: "cell-trend", type: "trend" }; 
        }
        return { points: 0, cssClass: "cell-miss", type: "miss" }; 
    }

    async function loadAllScores() {
        const thead = document.getElementById('table-head');
        const tbody = document.getElementById('table-body');
        const leaderboardBody = document.getElementById('leaderboard-body');
        
        const response = await fetch(API_URL);
        const data = await response.json();
        existingDatabaseRows = data[KEY_NAME] || [];
        
        thead.innerHTML = "";
        const trHead = document.createElement('tr');
        trHead.innerHTML = "<th style='position:sticky; left:0; background:#1a2238; z-index:3;'>Gracz</th>";
        
        allMatches.forEach(m => {
            const homeFormat = getFlagAnd3LetterCode(m.t1);
            const awayFormat = getFlagAnd3LetterCode(m.t2);
            const resultSub = m.score ? `<br><span style="color:#01c38d; font-size:10px;">(${m.score})</span>` : '';
            trHead.innerHTML += `
                <th>
                    <div class="th-match-header" style="flex-direction:column;">
                        <div style="font-size:9px; color:#8a99ad; margin-bottom:2px;">GR. ${m.group}</div>
                        <div>${homeFormat}-${awayFormat}</div>
                        ${resultSub}
                    </div>
                </th>`;
        });
        thead.appendChild(trHead);

        let playersLeaderboard = [];
        tbody.innerHTML = "";

        if (!Array.isArray(existingDatabaseRows) || existingDatabaseRows.length === 0) {
            tbody.innerHTML = "<tr><td colspan='73'>Brak wpisów w bazie danych.</td></tr>";
            leaderboardBody.innerHTML = "<tr><td colspan='3'>Brak danych do stworzenia rankingu.</td></tr>";
            refreshTwemoji();
            return;
        }

        existingDatabaseRows.forEach(row => {
            if (!row.gracz) return;
            let totalPoints = 0, countExact = 0, countTrend = 0;
            const tr = document.createElement('tr');
            let rowHtml = `<td style="font-weight:bold; color:#01c38d; position:sticky; left:0; background:#131927; z-index:1;">${row.gracz}</td>`;
            
            allMatches.forEach(m => {
                const matchKey = m.id.toLowerCase();
                const playerPrediction = row[matchKey] || '-';
                const evaluation = evaluatePrediction(playerPrediction, m.score);
                totalPoints += evaluation.points;
                if (evaluation.type === "exact") countExact++;
                if (evaluation.type === "trend") countTrend++;
                rowHtml += `<td class="${evaluation.cssClass}">${playerPrediction}</td>`;
            });
            
            tr.innerHTML = rowHtml;
            tbody.appendChild(tr);
            playersLeaderboard.push({ name: row.gracz, points: totalPoints, exacts: countExact, trends: countTrend });
        });

        playersLeaderboard.sort((a, b) => b.points !== a.points ? b.points - a.points : b.exacts - a.exacts);
        leaderboardBody.innerHTML = "";
        playersLeaderboard.forEach((player, index) => {
            const trRank = document.createElement('tr');
            trRank.className = "leaderboard-row";
            trRank.innerHTML = `
                <td><span class="rank-badge">${index + 1}</span></td>
                <td style="text-align: left; padding-left: 15px; font-weight: bold; color: #fff;">
                    ${player.name} <span class="stats-span">(🟢 x${player.exacts}, 🟡 x${player.trends})</span>
                </td>
                <td style="font-weight: bold; color: var(--primary); font-size: 16px;">${player.points} pkt</td>
            `;
            leaderboardBody.appendChild(trRank);
        });
        refreshTwemoji(); 
    }
</script>
